<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2, #ff6a88);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      color: white;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .navbar {
      background: rgba(255, 255, 255, 0.2) !important;
      backdrop-filter: blur(10px);
      border-radius: 10px;
    }

    .navbar a {
      color: white !important;
      font-weight: bold;
    }

    .btn-primary {
      background: linear-gradient(45deg, #ff6a88, #ff99ac);
      border: none;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <nav class="navbar mb-4 mt-3 mx-3 p-2">
    <div class="container">
      <a class="navbar-brand" href="{% url 'todo:task_list' %}">✨ Todo App</a>
      <a class="btn btn-primary" href="{% url 'todo:task_add' %}">+ Add Task</a>
    </div>
  </nav>

  <div class="container">
    <div class="glass">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
